<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Revenge of the Evil Aliens</title>
    <base href="/" />

    <!-- SEO / social (Stage 9). og:image is an absolute URL to the live host so link
         previews work when the public page is shared; the <base href> above is what CI
         rewrites for Pages, NOT these. -->
    <meta name="description" content="Revenge of the Evil Aliens — a 2008 Xbox Live Indie shoot-'em-up, recovered and ported to play in your browser. Up to 4-player couch co-op, three worlds, retro arcade mayhem." />
    <meta name="theme-color" content="#05030a" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Revenge of the Evil Aliens" />
    <meta property="og:description" content="A lost 2008 XBLIG shoot-'em-up, revived to play in your browser." />
    <meta property="og:image" content="https://coamithra.github.io/RotEA26/Content/gfx/preview/poster.png" />
    <meta property="og:url" content="https://coamithra.github.io/RotEA26/" />
    <meta name="twitter:card" content="summary_large_image" />

    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link href="css/app.css" rel="stylesheet" />
    <link href="EvilAliensWeb.styles.css" rel="stylesheet" />
</head>

<body>

    <div id="app">
        <div id="loading">
            <div class="loading-inner">
                <div class="loading-title">REVENGE OF THE<br/>EVIL ALIENS</div>
                <div class="loading-dots">loading<span>.</span><span>.</span><span>.</span></div>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">x</a>
    </div>

    <!-- Stage 9 on-screen UI: a fullscreen toggle (always) + touch controls (shown only
         on touch devices). Lives OUTSIDE #app so it survives Blazor's mount, which
         replaces #app's loading markup. Wired by the ea-ui script block below. -->
    <div id="ea-ui">
        <button id="ea-fs-btn" type="button" title="Fullscreen" aria-label="Toggle fullscreen">
            <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
                <path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5" fill="none"
                      stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </button>

        <div id="ea-touch">
            <div id="ea-dpad">
                <button class="ea-tbtn ea-up"    type="button" data-key="Up"    aria-label="Move up">&#9650;</button>
                <button class="ea-tbtn ea-left"  type="button" data-key="Left"  aria-label="Move left">&#9664;</button>
                <button class="ea-tbtn ea-right" type="button" data-key="Right" aria-label="Move right">&#9654;</button>
                <button class="ea-tbtn ea-down"  type="button" data-key="Down"  aria-label="Move down">&#9660;</button>
            </div>
            <button id="ea-fire" class="ea-tbtn" type="button" data-key="Mouse1" data-tap="Enter" aria-label="Fire / Select">FIRE</button>
            <button id="ea-back" class="ea-tbtn" type="button" data-tap="Esc" aria-label="Back / Pause">BACK</button>
        </div>
    </div>

    <script src="_framework/blazor.webassembly.js" autostart="false"></script>
    <script>
        Blazor.start();
    </script>

    <script src="_content/nkast.Wasm.Dom/js/JSObject.8.0.5.js"></script>
    <script src="_content/nkast.Wasm.Dom/js/Window.8.0.5.js"></script>
    <script src="_content/nkast.Wasm.Dom/js/Document.8.0.5.js"></script>
    <script src="_content/nkast.Wasm.Dom/js/Navigator.8.0.5.js"></script>
    <script src="_content/nkast.Wasm.Dom/js/Gamepad.8.0.5.js"></script>
    <script src="_content/nkast.Wasm.Dom/js/Media.8.0.5.js"></script>
    <script src="_content/nkast.Wasm.XHR/js/XHR.8.0.5.js"></script>
    <script src="_content/nkast.Wasm.Canvas/js/Canvas.8.0.5.js"></script>
    <script src="_content/nkast.Wasm.Canvas/js/CanvasGLContext.8.0.5.js"></script>
    <script src="_content/nkast.Wasm.Audio/js/Audio.8.0.5.js"></script>

    <script>
        // Web-port debug shortcuts: hand the URL query string to .NET at boot so
        // DebugFlags can parse ?menu / ?noattract / ?level=... (see Compat/DebugFlags.cs).
        window.getDebugQuery = () => (window.location.search || "");

        // Reliable input injection for testing — immune to the rAF frame-timing miss that
        // makes synthetic key events drop (see Compat/DebugInput.cs). Drive from the
        // console / automation: eaPress('Enter'), eaPress('Up'), eaPress('Left', 30).
        window.eaPress = (key, frames) => {
            try { DotNet.invokeMethod('EvilAliensWeb', 'debugPress', String(key), frames || 1); }
            catch (e) { console.warn('[debug] eaPress failed (game not booted yet?): ' + e.message); }
        };

        function tickJS()
        {
            window.theInstance.invokeMethod('TickDotNet');
            scheduleTick();
        }

        function scheduleTick()
        {
            // Browsers pause requestAnimationFrame in a backgrounded/hidden tab,
            // which would freeze the game (and stall headless/preview captures).
            // Fall back to setTimeout (~30fps) when hidden so the loop keeps
            // running; use rAF when visible for smooth, vsync-aligned frames.
            if (document.hidden)
                setTimeout(tickJS, 33);
            else
                window.requestAnimationFrame(tickJS);
        }

        function sizeCanvas()
        {
            var canvas = document.getElementById('theCanvas');
            var holder = document.getElementById('canvasHolder');
            if (!canvas || !holder)
                return;
            // The KNI back buffer follows the canvas drawing-buffer size, and KNI itself
            // re-syncs it to window.innerWidth/Height on every resize (GameWindow.OnResize),
            // so match that here for the first frame. The game renders at its native
            // 800x600 into an offscreen target and Game1.Draw blits it scaled+letterboxed
            // to this window-sized buffer (so the scene fills the window, aspect-correct).
            // Fall back to the window / 16:9 default when the holder hasn't laid out yet.
            canvas.width = holder.clientWidth || window.innerWidth || 1280;
            canvas.height = holder.clientHeight || window.innerHeight || 720;
        }

        window.initRenderJS = (instance) =>
        {
            window.theInstance = instance;

            sizeCanvas();
            window.addEventListener("resize", sizeCanvas);
            // disable context menu on right click
            document.getElementById('theCanvas').addEventListener("contextmenu", e => e.preventDefault());

            // begin game loop
            scheduleTick();
        };

        // eaQuit: the main-menu "Exit" "boss key". A browser tab can't really quit, so
        // we "close" the game (fade the canvas to black) and hand off to the shared
        // Meridian desktop -- now its own repo/site (the fake corporate decoy + the
        // games launcher). We pass ?from=evilaliens so Meridian's Shut Down returns
        // here. C# reaches this via Compat/ExitInterop.Quit().
        window.eaQuit = function ()
        {
            // Single knob: where Meridian lives. The game is on GitHub Pages while
            // Meridian is hosted at haraldmaassen.com/meridian (Hetzner), so this is absolute
            // cross-origin base. Flip back to the relative sibling "../meridian/" once
            // the game and Meridian live on the same origin (e.g. both on the server).
            // Target the explicit index.html (not the bare directory) so a static host
            // serves the file directly rather than through any SPA fallback.
            var MERIDIAN_BASE = "https://haraldmaassen.com/meridian/";
            var url;
            try { url = new URL("index.html?from=evilaliens", new URL(MERIDIAN_BASE, document.baseURI)).href; }
            catch (e) { url = MERIDIAN_BASE + "index.html?from=evilaliens"; }
            var ov = document.createElement("div");
            ov.style.cssText = "position:fixed;inset:0;background:#000;opacity:0;z-index:99999;transition:opacity .5s ease";
            document.body.appendChild(ov);
            requestAnimationFrame(function () { ov.style.opacity = "1"; });
            setTimeout(function () { window.location.href = url; }, 560);
        };

        // Prevent arrow keys / spacebar / wheel from scrolling the page (esp. in an iframe)
        window.addEventListener("keydown", function(event)
        {
            if ([32, 37, 38, 39, 40].indexOf(event.keyCode) > -1)
                event.preventDefault();
        });
        window.addEventListener("wheel", function(event)
        {
            event.preventDefault();
        }, { passive: false });
    </script>

    <script>
        // ----- Stage 9: browser fullscreen + on-screen touch controls -----------
        // eaFullscreen drives the DOM Fullscreen API (KNI's graphics.IsFullScreen is a
        // no-op on BlazorGL). Entering/leaving just resizes the canvas, which KNI already
        // follows and Game1.Draw letterboxes — no graphics work needed. C# reaches set()
        // via Compat/FullscreenInterop (the in-menu "Fullscreen" option); the corner
        // button is the guaranteed-gesture path.
        window.eaFullscreen = (function ()
        {
            var docEl = document.documentElement;
            function supported()
            {
                return !!(docEl.requestFullscreen || docEl.webkitRequestFullscreen);
            }
            function isFs()
            {
                return !!(document.fullscreenElement || document.webkitFullscreenElement);
            }
            function enter()
            {
                var fn = docEl.requestFullscreen || docEl.webkitRequestFullscreen;
                if (!fn) return;
                try { var r = fn.call(docEl); if (r && r.catch) r.catch(function () { }); }
                catch (e) { /* rejected without a gesture — non-fatal */ }
            }
            function exit()
            {
                var fn = document.exitFullscreen || document.webkitExitFullscreen;
                if (!fn) return;
                try { var r = fn.call(document); if (r && r.catch) r.catch(function () { }); }
                catch (e) { }
            }
            return {
                supported: supported,
                isFullscreen: isFs,
                toggle: function () { if (isFs()) exit(); else enter(); },
                set: function (on) { if (on && !isFs()) enter(); else if (!on && isFs()) exit(); }
            };
        })();

        // eaHold: persistent press for the on-screen D-pad/fire button. Mirrors eaPress
        // but holds the key down until released (see Compat/DebugInput.cs Hold/Consume).
        window.eaHold = function (key, down)
        {
            try { DotNet.invokeMethod('EvilAliensWeb', 'debugHold', String(key), !!down); }
            catch (e) { /* game not booted yet — ignore */ }
        };

        (function ()
        {
            function setup()
            {
                var ui = document.getElementById('ea-ui');
                if (!ui) return;

                var fsBtn = document.getElementById('ea-fs-btn');
                if (fsBtn)
                {
                    if (!window.eaFullscreen.supported())
                    {
                        // iOS Safari et al. can't fullscreen an arbitrary element — hide it.
                        fsBtn.style.display = 'none';
                    }
                    else
                    {
                        fsBtn.addEventListener('click', function (e)
                        {
                            e.preventDefault();
                            window.eaFullscreen.toggle();
                        });
                        var syncFs = function () { ui.classList.toggle('ea-fs-on', window.eaFullscreen.isFullscreen()); };
                        document.addEventListener('fullscreenchange', syncFs);
                        document.addEventListener('webkitfullscreenchange', syncFs);
                    }
                }

                // Touch controls only make sense on a touch device.
                var isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
                if (isTouch)
                {
                    ui.classList.add('ea-has-touch');
                    var btns = ui.querySelectorAll('#ea-touch .ea-tbtn');
                    Array.prototype.forEach.call(btns, function (b)
                    {
                        var holdKey = b.getAttribute('data-key');   // held while pressed
                        var tapKey = b.getAttribute('data-tap');    // single tap on press
                        var press = function (e)
                        {
                            if (e) e.preventDefault();
                            b.classList.add('ea-active');
                            if (tapKey) window.eaPress(tapKey, 1);
                            if (holdKey) window.eaHold(holdKey, true);
                        };
                        var release = function (e)
                        {
                            if (e) e.preventDefault();
                            b.classList.remove('ea-active');
                            if (holdKey) window.eaHold(holdKey, false);
                        };
                        b.addEventListener('touchstart', press, { passive: false });
                        b.addEventListener('touchend', release, { passive: false });
                        b.addEventListener('touchcancel', release, { passive: false });
                        // Mouse fallback so the overlay is also testable on desktop.
                        b.addEventListener('mousedown', press);
                        b.addEventListener('mouseup', release);
                        b.addEventListener('mouseleave', function (e) { if (b.classList.contains('ea-active')) release(e); });
                        b.addEventListener('contextmenu', function (e) { e.preventDefault(); });
                    });
                }
            }

            if (document.readyState === 'loading')
                document.addEventListener('DOMContentLoaded', setup);
            else
                setup();
        })();
    </script>

    <script>
        // ----- ?fx live FX tuning panel (dev only) --------------------------
        // On-screen buttons to toggle render features while dialing in the new
        // starfield. Built ONLY when the URL query contains `fx`, so normal play
        // and the live site never see it. Each change is pushed to C# DebugToggles
        // via DotNet.invokeMethod('EvilAliensWeb','debugFx', key, value). Defaults
        // start CLEAN: bloom OFF, bg-veil OFF, gamma ON, brightness 100%.
        (function ()
        {
            if (!/[?&]fx(?:[=&]|$)/.test(window.location.search || "")) return;
            var fx = { bloom: 0, veil: 0, gamma: 1, brightness: 1 };

            function send(k, v)
            {
                try { DotNet.invokeMethod('EvilAliensWeb', 'debugFx', String(k), Number(v)); return true; }
                catch (e) { return false; }
            }
            function pushAll()
            {
                // Retry until the .NET runtime is up, then push the initial state.
                if (!send('bloom', fx.bloom)) { setTimeout(pushAll, 200); return; }
                send('veil', fx.veil); send('gamma', fx.gamma); send('brightness', fx.brightness);
            }

            function build()
            {
                var p = document.createElement('div');
                p.id = 'ea-fx';
                p.style.cssText = 'position:fixed;top:54px;right:8px;z-index:99999;background:rgba(8,6,16,.82);' +
                    'border:1px solid #3a3550;border-radius:8px;padding:8px;font:12px/1.3 monospace;color:#e8e6f2;' +
                    'user-select:none;min-width:154px;box-shadow:0 2px 12px rgba(0,0,0,.5)';
                p.innerHTML = '<div style="font-weight:bold;letter-spacing:1px;margin-bottom:6px;opacity:.8">FX PANEL</div>';

                function mkToggle(key, label)
                {
                    var b = document.createElement('button');
                    b.style.cssText = 'display:block;width:100%;margin:3px 0;padding:5px 8px;border-radius:5px;' +
                        'border:1px solid #444;cursor:pointer;font:inherit;text-align:left';
                    function paint()
                    {
                        var on = !!fx[key];
                        b.style.background = on ? '#2e7d32' : '#2a2733';
                        b.style.color = on ? '#fff' : '#9a96aa';
                        b.style.borderColor = on ? '#43a047' : '#444';
                        b.textContent = (on ? '● ' : '○ ') + label;
                    }
                    b.onclick = function () { fx[key] = fx[key] ? 0 : 1; send(key, fx[key]); paint(); };
                    paint(); p.appendChild(b);
                }
                mkToggle('bloom', 'Bloom');
                mkToggle('veil', 'BG dark veil');
                mkToggle('gamma', 'Gamma');

                var row = document.createElement('div');
                row.style.cssText = 'margin-top:6px;border-top:1px solid #3a3550;padding-top:6px';
                row.innerHTML = '<div style="opacity:.8;margin-bottom:3px">Starfield brightness</div>';
                var wrap = document.createElement('div');
                wrap.style.cssText = 'display:flex;gap:3px';
                [['30%', 0.3], ['50%', 0.5], ['75%', 0.75], ['100%', 1]].forEach(function (o)
                {
                    var b = document.createElement('button');
                    b.textContent = o[0];
                    b.style.cssText = 'flex:1;padding:5px 0;border-radius:5px;border:1px solid #444;cursor:pointer;font:inherit';
                    function paint()
                    {
                        var on = Math.abs(fx.brightness - o[1]) < 0.001;
                        b.style.background = on ? '#1565c0' : '#2a2733';
                        b.style.color = on ? '#fff' : '#9a96aa';
                        b.style.borderColor = on ? '#1e88e5' : '#444';
                    }
                    b.onclick = function ()
                    {
                        fx.brightness = o[1]; send('brightness', fx.brightness);
                        Array.prototype.forEach.call(wrap.children, function (c) { c._paint && c._paint(); });
                    };
                    b._paint = paint; paint(); wrap.appendChild(b);
                });
                row.appendChild(wrap); p.appendChild(row);
                document.body.appendChild(p);
                pushAll();
            }

            if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', build);
            else build();
        })();
    </script>

    <script>
        // ----- eaMusic: WebAudio background-music layer (Stage 6) -------------
        // Music needs seamless loop POINTS (intro -> looping body, or a
        // pymusiclooper seam), which KNI's whole-buffer SoundEffect looping can't
        // do. Tracks + loop points live in Content/music/music.json; C# drives
        // this via MusicInterop (eaMusic.play/stop/setRate). SFX stay on KNI.
        window.eaMusic = (function ()
        {
            var ctx = null, master = null;
            var manifest = null, manifestPromise = null;
            var started = false;     // AudioContext unlocked by a user gesture?
            var pending = null;      // track requested before unlock
            var current = null;      // { cue, src, gain }
            var token = 0;           // newer play() supersedes in-flight loads
            var curRate = 1;

            function ensureCtx()
            {
                if (ctx) return;
                var AC = window.AudioContext || window.webkitAudioContext;
                ctx = new AC();
                master = ctx.createGain();
                master.gain.value = 0.55;
                master.connect(ctx.destination);
            }

            function loadManifest()
            {
                if (!manifestPromise)
                    manifestPromise = fetch("Content/music/music.json")
                        .then(function (r) { return r.json(); })
                        .then(function (m) { manifest = m; return m; })
                        .catch(function () { manifest = {}; return {}; });
                return manifestPromise;
            }

            // Authored Music category (alienssfx.xgs): ReplaceOldest with 2.5s
            // fadeIn/fadeOut, so a cue change crossfades over 2.5s.
            var MUSIC_FADE = 2.5;

            function fadeOut(entry)
            {
                if (!entry) return;
                var t = ctx.currentTime;
                entry.gain.gain.setValueAtTime(entry.gain.gain.value, t);
                entry.gain.gain.linearRampToValueAtTime(0.0001, t + MUSIC_FADE);
                try { entry.src.stop(t + MUSIC_FADE + 0.05); } catch (e) { }
            }

            function startTrack(cue)
            {
                ensureCtx();
                loadManifest().then(function (m)
                {
                    var info = m[cue];
                    if (!info) return;
                    if (current && current.cue === cue) return;   // already on it
                    var myToken = ++token;
                    fetch(encodeURI(info.file)).then(function (resp)
                    {
                        if (!resp.ok) throw 0;
                        return resp.arrayBuffer();
                    }).then(function (ab)
                    {
                        return ctx.decodeAudioData(ab);
                    }).then(function (buf)
                    {
                        if (myToken !== token) return;            // superseded
                        fadeOut(current); current = null;
                        var src = ctx.createBufferSource();
                        src.buffer = buf;
                        src.loop = true;
                        if (info.loopEnd > info.loopStart)
                        {
                            src.loopStart = info.loopStart;       // seconds
                            src.loopEnd = info.loopEnd;
                        }
                        src.playbackRate.value = curRate;
                        var g = ctx.createGain();
                        // Fade the new track in over the authored 2.5s (crossfades
                        // against the outgoing track's matching fadeOut).
                        var t0 = ctx.currentTime;
                        g.gain.setValueAtTime(0.0001, t0);
                        g.gain.linearRampToValueAtTime(0.6, t0 + MUSIC_FADE);
                        src.connect(g).connect(master);
                        src.start();
                        current = { cue: cue, src: src, gain: g };
                    }).catch(function () { /* music is non-fatal */ });
                });
            }

            function kick()
            {
                if (started) return;
                started = true;
                ensureCtx();
                ctx.resume().then(function ()
                {
                    if (pending) { var c = pending; pending = null; startTrack(c); }
                });
                window.removeEventListener("keydown", kick);
                window.removeEventListener("pointerdown", kick);
            }
            window.addEventListener("keydown", kick);
            window.addEventListener("pointerdown", kick);

            return {
                play: function (cue)
                {
                    curRate = 1;
                    if (!started) { pending = cue; return; }
                    startTrack(cue);
                },
                stop: function ()
                {
                    pending = null;
                    curRate = 1;
                    if (current) { fadeOut(current); current = null; }
                },
                setRate: function (rate)
                {
                    // `rate` is already the AudioBufferSourceNode.playbackRate: the C#
                    // side (MusicInterop) applies the authored XACT Pitch RPC curve.
                    curRate = Math.max(0.25, rate);
                    if (current && ctx)
                    {
                        try { current.src.playbackRate.setTargetAtTime(curRate, ctx.currentTime, 0.05); }
                        catch (e) { }
                    }
                }
            };
        })();
    </script>

    <script>
        // ----- eaSave: localStorage persistence for the save tree (Stage 7) ----
        // The game writes settings / unlockables / awardments / level screenshots
        // to the in-memory WASM filesystem (StorageStub.cs). This mirrors that tree
        // to localStorage so it survives a reload; C# drives it via SaveInterop.
        // Keys are "eaweb_save:<relpath>" (e.g. eaweb_save:EvilAliens/Settings.xml);
        // values are base64 of the raw file bytes.
        window.eaSave = (function ()
        {
            var PREFIX = "eaweb_save:";
            return {
                // Returns JSON { "<relpath>": "<base64>", ... } for every entry.
                load: function ()
                {
                    var out = {};
                    try
                    {
                        for (var i = 0; i < localStorage.length; i++)
                        {
                            var k = localStorage.key(i);
                            if (k && k.indexOf(PREFIX) === 0)
                                out[k.substring(PREFIX.length)] = localStorage.getItem(k);
                        }
                    }
                    catch (e) { console.warn("eaSave.load failed", e); }
                    return JSON.stringify(out);
                },
                // Returns false if it didn't stick (quota / disabled storage), so C#
                // keeps the file dirty and retries on the next save.
                set: function (name, b64)
                {
                    try { localStorage.setItem(PREFIX + name, b64); return true; }
                    catch (e)
                    {
                        console.warn("eaSave: could not persist " + name + " (quota?)", e);
                        return false;
                    }
                },
                remove: function (name)
                {
                    try { localStorage.removeItem(PREFIX + name); } catch (e) { }
                }
            };
        })();

        // ----- eaLoadProfile: localStorage-backed texture-load profile (debug) -----
        // The C# LoadProfiler (Compat/LoadProfiler.cs, enabled by ?loadlog) records
        // which textures decode in which level and whether they were preloaded; it
        // mirrors that here so the data accumulates across reloads, and the level
        // preloader reads it back so a gap hit last run is warm this run. One key, a
        // plain-text manifest. download() saves it as a file to commit; release builds
        // never call save() (RecordTexture is a no-op without ?loadlog).
        window.eaLoadProfile = (function ()
        {
            var KEY = "eaweb_loadprofile";
            return {
                load: function () { try { return localStorage.getItem(KEY) || ""; } catch (e) { return ""; } },
                save: function (text)
                {
                    try { localStorage.setItem(KEY, text); return true; }
                    catch (e) { console.warn("eaLoadProfile.save failed (quota?)", e); return false; }
                },
                clear: function () { try { localStorage.removeItem(KEY); } catch (e) { } },
                download: function (name, text)
                {
                    try
                    {
                        var blob = new Blob([text], { type: "text/plain" });
                        var a = document.createElement("a");
                        a.href = URL.createObjectURL(blob);
                        a.download = name || "preload_manifest.txt";
                        document.body.appendChild(a);
                        a.click();
                        setTimeout(function () { URL.revokeObjectURL(a.href); a.remove(); }, 0);
                    }
                    catch (e) { console.warn("eaLoadProfile.download failed", e); }
                }
            };
        })();

        // Console helper: dump + download the accumulated preload manifest. Returns
        // the text too, so `eaPreloadExport()` prints it inline. No-op data if ?loadlog
        // wasn't set this session.
        window.eaPreloadExport = function ()
        {
            try { return DotNet.invokeMethod("EvilAliensWeb", "ExportPreloadManifest"); }
            catch (e) { console.warn("eaPreloadExport failed (game not ready?)", e); return ""; }
        };
    </script>
</body>

</html>
