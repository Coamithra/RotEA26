<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Meridian Workspace</title>
    <meta name="description" content="Meridian Office Suite — Synergy, Delivered." />
    <meta name="theme-color" content="#0d1530" />

    <!-- ============================================================================
         MERIDIAN WORKSPACE  —  the "boss key" decoy.

         This is a self-contained fake corporate desktop OS that the game navigates to
         when the player picks "Exit" in the main menu (see ../index.html eaQuit +
         ../../Compat/ExitInterop.cs). It is deliberately a DIFFERENT, dependency-free
         stack (plain HTML/CSS/JS, no build step) living in its own folder so it can
         never interfere with the Blazor/KNI game. Relative paths only — no <base href>,
         so it works at "/office/" locally and "/RotEA26/office/" on GitHub Pages.
         "Shut Down" in the Start menu navigates back to the game ("../").
    ============================================================================ -->

    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%232563a8'/%3E%3Cpath d='M9 22V10l7 8 7-8v12' fill='none' stroke='white' stroke-width='2.6' stroke-linejoin='round' stroke-linecap='round'/%3E%3C/svg%3E" />
    <link href="./office.css" rel="stylesheet" />
</head>

<body>
    <!-- Boot splash — shown instantly (in HTML) before office.js wakes the desktop. -->
    <div id="boot">
        <div class="boot-inner">
            <div class="boot-logo" aria-hidden="true">
                <svg viewBox="0 0 64 64" width="68" height="68">
                    <rect width="64" height="64" rx="13" fill="#2563a8" />
                    <path d="M17 45V19l15 17 15-17v26" fill="none" stroke="#fff" stroke-width="5"
                        stroke-linejoin="round" stroke-linecap="round" />
                </svg>
            </div>
            <div class="boot-name">MERIDIAN<span>WORKSPACE</span></div>
            <div class="boot-spinner" aria-hidden="true"><i></i><i></i><i></i><i></i><i></i></div>
            <div class="boot-status" id="bootStatus">Starting your session&hellip;</div>
            <div class="boot-foot">Meridian Dynamics Inc. &middot; Build 11.4.2026 &middot; Synergy, Delivered.</div>
        </div>
    </div>

    <!-- The live desktop. Everything inside is built/managed by office.js. -->
    <div id="os" hidden>
        <div id="desktop" aria-label="Desktop"></div>
        <div id="window-layer"></div>
        <div id="taskbar"></div>
        <div id="startmenu" class="hidden" role="menu" aria-label="Start menu"></div>
        <div id="toast-layer" aria-live="polite"></div>
        <div id="dialog-layer" class="hidden"></div>
        <div id="drag-ghost" hidden></div>
    </div>

    <script src="./office.js"></script>
</body>

</html>
